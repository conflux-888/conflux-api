basePath: /api/v1
definitions:
  event.SeedAdminEventRequest:
    properties:
      country:
        type: string
      description:
        type: string
      event_root_code:
        enum:
        - "14"
        - "15"
        - "16"
        - "17"
        - "18"
        - "19"
        - "20"
        type: string
      event_type:
        type: string
      latitude:
        maximum: 90
        minimum: -90
        type: number
      location_name:
        type: string
      longitude:
        maximum: 180
        minimum: -180
        type: number
      num_articles:
        type: integer
      severity:
        enum:
        - critical
        - high
        - medium
        - low
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - country
    - latitude
    - longitude
    - severity
    - title
    type: object
  preferences.UpdateLocationRequest:
    properties:
      latitude:
        type: number
      longitude:
        type: number
    required:
    - latitude
    - longitude
    type: object
  preferences.UpdateRequest:
    properties:
      min_severity:
        enum:
        - critical
        - high
        - medium
        - low
        type: string
      notifications_enabled:
        type: boolean
      radius_km:
        maximum: 500
        minimum: 1
        type: number
    type: object
  report.CreateReportRequest:
    properties:
      country:
        type: string
      description:
        maxLength: 2000
        type: string
      event_type:
        enum:
        - armed_conflict
        - use_of_force
        - explosion
        - terrorism
        - civil_unrest
        - other
        type: string
      latitude:
        type: number
      location_name:
        type: string
      longitude:
        type: number
      severity:
        enum:
        - critical
        - high
        - medium
        - low
        type: string
      title:
        maxLength: 200
        type: string
    required:
    - country
    - event_type
    - latitude
    - longitude
    - severity
    - title
    type: object
  summary.TriggerRequest:
    properties:
      date:
        type: string
    required:
    - date
    type: object
  user.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  user.RegisterRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  user.UpdateProfileRequest:
    properties:
      display_name:
        type: string
    required:
    - display_name
    type: object
host: localhost:8080
info:
  contact: {}
  description: Global Threat Report API — aggregates conflict events from GDELT and
    user reports.
  title: Conflux API
  version: "1.0"
paths:
  /admin/events/{id}:
    delete:
      description: Hard-deletes the event and its related notifications. Only works
        on seeded events (external_id prefix ADMIN_TEST_).
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete an admin-seeded event
      tags:
      - admin
  /admin/events/seed:
    post:
      consumes:
      - application/json
      description: Inserts an admin-controlled event and triggers the same notification
        pipeline as GDELT sync. Used for testing notification delivery.
      parameters:
      - description: Seed parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/event.SeedAdminEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Seed a synthetic event (admin only)
      tags:
      - admin
  /admin/events/seeded:
    delete:
      description: Hard-deletes every seeded event (external_id prefix ADMIN_TEST_)
        and their notifications.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete ALL admin-seeded events
      tags:
      - admin
    get:
      description: Returns events created via admin seed (external_id prefix ADMIN_TEST_),
        newest first.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List admin-seeded events
      tags:
      - admin
  /admin/summaries/trigger:
    post:
      consumes:
      - application/json
      description: Manually generate a summary for a specific date
      parameters:
      - description: Date to generate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/summary.TriggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Trigger summary generation
      tags:
      - admin
  /admin/sync/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get GDELT sync status
      tags:
      - admin
  /admin/sync/trigger:
    post:
      description: Runs a full GDELT sync cycle synchronously and returns the result
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Trigger GDELT sync manually
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login and get access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - auth
  /events:
    get:
      description: Returns paginated, filterable list of conflict events (GDELT +
        user reports)
      parameters:
      - description: 'Comma-separated: critical,high,medium,low'
        in: query
        name: severity
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by country code
        in: query
        name: country
        type: string
      - description: gdelt or user_report
        in: query
        name: source
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: 'Bounding box: min_lng,min_lat,max_lng,max_lat'
        in: query
        name: bbox
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: limit
        type: integer
      - default: date_desc
        description: date_desc, date_asc, severity
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List events
      tags:
      - events
  /events/{id}:
    get:
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get event by ID
      tags:
      - events
  /events/nearby:
    get:
      description: Returns events within a radius of a geographic point
      parameters:
      - description: Latitude
        in: query
        name: lat
        required: true
        type: number
      - description: Longitude
        in: query
        name: lng
        required: true
        type: number
      - default: 50
        description: Radius in km (max 500)
        in: query
        name: radius_km
        type: number
      - description: Filter by severity
        in: query
        name: severity
        type: string
      - default: 20
        description: Max results (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Find nearby events
      tags:
      - events
  /notifications/{id}/read:
    post:
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - notifications
  /notifications/me:
    get:
      parameters:
      - default: false
        description: Filter unread only
        in: query
        name: unread_only
        type: boolean
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List my notifications
      tags:
      - notifications
  /notifications/me/unread-count:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get unread notification count
      tags:
      - notifications
  /notifications/read-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - notifications
  /preferences:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get my preferences
      tags:
      - preferences
    put:
      consumes:
      - application/json
      parameters:
      - description: Preferences
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/preferences.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update my preferences
      tags:
      - preferences
  /preferences/location:
    put:
      consumes:
      - application/json
      parameters:
      - description: Location
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/preferences.UpdateLocationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update my current location
      tags:
      - preferences
  /reports:
    post:
      consumes:
      - application/json
      description: Creates a threat event report and auto-clusters with nearby reports
      parameters:
      - description: Report data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/report.CreateReportRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Submit a user report
      tags:
      - reports
  /reports/{id}:
    delete:
      description: Soft-deletes a report (only the owner can delete)
      parameters:
      - description: Report/Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete my report
      tags:
      - reports
  /reports/me:
    get:
      description: Returns paginated list of the authenticated user's reports
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List my reports
      tags:
      - reports
  /summaries:
    get:
      description: Returns paginated list of daily conflict summaries
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 7
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List daily summaries
      tags:
      - summaries
  /summaries/{date}:
    get:
      description: Returns the daily summary for a specific date
      parameters:
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get summary by date
      tags:
      - summaries
  /summaries/latest:
    get:
      description: Returns the most recent completed daily summary
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get latest summary
      tags:
      - summaries
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: Profile data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update my profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Enter your Bearer token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
