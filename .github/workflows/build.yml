name: Build and Push Image

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=dev-${{ env.VERSION }}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "tag=dev-${{ env.VERSION }}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "tag=master-${{ env.VERSION }}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Kaniko auth
        run: |
          echo '{"auths":{"ghcr.io":{"auth":"'$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)'"}}}' \
            > $GITHUB_WORKSPACE/config.json

      - name: Build and push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:latest
        with:
          args: >-
            --dockerfile=Dockerfile
            --context=/github/workspace
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            --push-retry=2
            --cache=true
        env:
          DOCKER_CONFIG: /github/workspace
